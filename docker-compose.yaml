x-logging:
  &default-logging
  logging:
    driver: json-file
    options:
      max-size: 100M

services:
  server:
    image: judge0/judge0:1.13.1
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    ports:
      - "2358:2358"
    privileged: true
    <<: *default-logging
    restart: always

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2358/workers?X-Auth-Token=bf3163583136aee385e1b67c0e2153a7fbca4b0989c5cfbd3a6fde5064df0e86"]
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 40s
      start_interval: 5s

  workers:
    image: judge0/judge0:1.13.1
    command: ["./scripts/workers"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    <<: *default-logging
    restart: always

  db:
    image: postgres:16.2
    env_file: judge0.conf
    volumes:
      - data:/var/lib/postgresql/data/
    <<: *default-logging
    restart: always

  redis:
    image: redis:7.2.4
    command: [
      "bash", "-c",
      'docker-entrypoint.sh --appendonly no --requirepass "$$REDIS_PASSWORD"'
    ]
    env_file: judge0.conf
    <<: *default-logging
    restart: always

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx-rtsp
    restart: unless-stopped
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
      - ./recordings:/recordings
    ports:
      - 8889:8889
      - 9996:9996
  
  #mysql:
  #  image: mysql
  #  container_name: spotted-mysql
  #  restart: "always"
  #  environment:
  #    MYSQL_DATABASE: spotted-db
  #    MYSQL_ROOT_PASSWORD: root
  #  ports:
  #    - 7778:3306
  #  volumes:
  #    - /spotted/mysql:/var/lib/mysql
      #- ./mysql-init:/docker-entrypoint-initdb.d

  app:
    build: .
    depends_on:
      server:
        condition: service_healthy
        restart: true
    ports:
      - "42069:42069"
    env_file:
      - ./.env 


volumes:
  data:
